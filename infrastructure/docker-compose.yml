version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stock_trading_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tradingpassword
      POSTGRES_DB: stock_market_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: stock_trading_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
